    module: trend_trawler.tools
    args: [tool_context]
    params:
      returns: dict
  update_env_file:
    type: sync
    module: deployment.deploy_agent
    args: [prefix, agent_engine_id, env_file_path]
  write_to_file:
    type: sync
    module: trend_trawler.tools
    args: [content, tool_context]
    params:
      returns: dict
  write_trends_to_bq:
    type: sync
    module: trend_trawler.tools
    args: [tool_context]
    params:
      returns: dict

