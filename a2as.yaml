files:
  "..":
    type: pattern
    actions: [read]
    params:
      caller: [os.path.join]
      pattern: [os.path.dirname(), ".."]
  .env:
    type: pattern
    actions: [read]
    params:
      caller: [os.path.join]
      pattern: [os.path.dirname(), "..", .env]
  LOCAL_DIR:
    type: variable
    actions: [read, delete]
    params:
      caller: [Path, shutil.rmtree]
  local_file:
